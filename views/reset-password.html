<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новый пароль — АвтоМобилСервис</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/01-tokens.css">
    <link rel="stylesheet" href="/css/02-base.css">
    <link rel="stylesheet" href="/css/03-layout.css">
    <link rel="stylesheet" href="/css/04-components.css">
    <link rel="stylesheet" href="/css/05-navigation.css">
    <link rel="stylesheet" href="/css/06-animations.css">
    <link rel="stylesheet" href="/css/pages/auth.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-key"></i>
                    <span>Новый пароль</span>
                </div>
                <p class="login-subtitle">Введите новый пароль для вашей учётной записи</p>
            </div>

            <form id="reset-password-form">
                <input type="hidden" id="reset-token" value="<%= typeof token !== 'undefined' ? token : '' %>">

                <div class="form-group">
                    <label for="new-password">Новый пароль</label>
                    <input type="password" id="new-password" required minlength="6" autocomplete="new-password" placeholder="Не менее 6 символов">
                </div>

                <div class="form-group">
                    <label for="new-password-confirm">Подтверждение</label>
                    <input type="password" id="new-password-confirm" required minlength="6" autocomplete="new-password" placeholder="Повторите пароль">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Сохранить пароль</button>

                <div class="form-footer">
                    <a href="/login">Вернуться ко входу</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/toast.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const fromQuery = params.get('token');
            const hidden = document.getElementById('reset-token');

            if (fromQuery && !hidden.value) {
                hidden.value = fromQuery;
            }

            document.getElementById('reset-password-form').addEventListener('submit', function(e) {
                e.preventDefault();

                const token = document.getElementById('reset-token').value.trim();
                const password = document.getElementById('new-password').value;
                const confirm = document.getElementById('new-password-confirm').value;

                if (!token) {
                    showNotification('Отсутствует токен восстановления. Запросите ссылку заново.', 'error');
                    return;
                }

                if (password !== confirm) {
                    showNotification('Пароли не совпадают', 'error');
                    return;
                }

                fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                })
                .then(function(r) { return r.json().then(function(data) { return { ok: r.ok, data: data }; }); })
                .then(function(result) {
                    if (result.ok && result.data.success) {
                        showNotification('Пароль успешно изменён. Войдите с новым паролём.', 'success');
                        window.location.href = '/login';
                    } else {
                        showNotification(result.data.error || 'Не удалось сменить пароль', 'error');
                    }
                })
                .catch(function() {
                    showNotification('Ошибка соединения с сервером', 'error');
                });
            });
        });
    </script>
</body>
</html>
